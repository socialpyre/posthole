default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]
default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.12
    hooks:
      - id: uv-lock

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.21.2
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.2
    hooks:
      - id: check-github-workflows
      - id: check-dependabot

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.3
    hooks:
      - id: prettier
        types_or: [markdown, json, yaml, css, javascript, ts]

  - repo: local
    hooks:
      - id: ty
        name: ty (typecheck)
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false

      - id: no-private-index
        name: block private/internal package indexes
        language: pygrep
        types_or: [toml, ini, text, yaml, json]
        entry: >-
          (?i)(\bcodeartifact[\w.-]*\.amazonaws\.com\b|\bpkgs\.dev\.azure\.com/[\w./-]+/_packaging\b|\b[\w.-]+\.pkgs\.visualstudio\.com\b|\bjfrog\.io\b|\bartifactory\.[\w.-]+\b|\bnpm\.pkg\.github\.com\b|\bpypi\.pkg\.github\.com\b)
        exclude: ^(\.pre-commit-config\.yaml|README\.md|CONTRIBUTING\.md|docs/.*)$

      - id: varlock-load
        name: varlock (load .env.schema)
        entry: pnpm exec varlock load
        language: system
        files: ^\.env\.schema$
        pass_filenames: false
