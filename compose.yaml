services:
  posthole:
    image: ghcr.io/socialpyre/posthole:latest
    # build: .
    ports:
      # Loopback-only by default — posthole is a developer tool, not a public
      # service. Change to "5176:5176" to bind on all host interfaces (LAN).
      - "127.0.0.1:5176:5176"
    volumes:
      - posthole-data:/data
    environment:
      POSTHOLE_DATABASE_URL: /data/posthole.db
    restart: unless-stopped

volumes:
  posthole-data:
